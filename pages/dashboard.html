<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Embed</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        .embedded-view-frame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .embedded-view-frame.loaded {
            opacity: 1;
        }

        /* ── Loader overlay ─────────────────────────────────── */
        #loaderOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #loaderOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* From Uiverse.io by alexruix */
        .loader {
            --cell-size: 52px;
            --cell-spacing: 1px;
            --cells: 3;
            --total-size: calc(var(--cells) * (var(--cell-size) + 2 * var(--cell-spacing)));
            display: flex;
            flex-wrap: wrap;
            width: var(--total-size);
            height: var(--total-size);
        }

        .cell {
            flex: 0 0 var(--cell-size);
            margin: var(--cell-spacing);
            background-color: transparent;
            box-sizing: border-box;
            border-radius: 4px;
            animation: 1.5s ripple ease infinite;
        }

        .cell.d-1 { animation-delay: 100ms; }
        .cell.d-2 { animation-delay: 200ms; }
        .cell.d-3 { animation-delay: 300ms; }
        .cell.d-4 { animation-delay: 400ms; }

        .cell:nth-child(1) { --cell-color: #00FF87; }
        .cell:nth-child(2) { --cell-color: #0CFD95; }
        .cell:nth-child(3) { --cell-color: #17FBA2; }
        .cell:nth-child(4) { --cell-color: #23F9B2; }
        .cell:nth-child(5) { --cell-color: #30F7C3; }
        .cell:nth-child(6) { --cell-color: #3DF5D4; }
        .cell:nth-child(7) { --cell-color: #45F4DE; }
        .cell:nth-child(8) { --cell-color: #53F1F0; }
        .cell:nth-child(9) { --cell-color: #60EFFF; }

        @keyframes ripple {
            0%   { background-color: transparent; }
            30%  { background-color: var(--cell-color); }
            60%  { background-color: transparent; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body>

    <div id="loaderOverlay">
        <div class="loader">
            <div class="cell d-0"></div>
            <div class="cell d-1"></div>
            <div class="cell d-2"></div>
            <div class="cell d-3"></div>
            <div class="cell d-4"></div>
            <div class="cell d-1"></div>
            <div class="cell d-2"></div>
            <div class="cell d-3"></div>
            <div class="cell d-4"></div>
        </div>
    </div>

    <iframe
        id="dashboardFrame"
        class="embedded-view-frame"
        src="../index.html?legacyView=dashboard"
        title="Dashboard"
    ></iframe>

    <script>
        const frame   = document.getElementById('dashboardFrame');
        const overlay = document.getElementById('loaderOverlay');

        // Mostra o loader por pelo menos 2s, depois aguarda o iframe estar pronto
        const minDisplay = new Promise(r => setTimeout(r, 2000));
        const iframeLoad = new Promise(r => frame.addEventListener('load', r, { once: true }));

        Promise.all([minDisplay, iframeLoad]).then(() => {
            overlay.classList.add('hidden');
            frame.classList.add('loaded');
            overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
        });

        // Fallback: máximo 10s independente de tudo
        setTimeout(() => {
            if (!frame.classList.contains('loaded')) {
                overlay.classList.add('hidden');
                frame.classList.add('loaded');
            }
        }, 10000);
    </script>

</body>
</html>
